<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grounds of Hogwarts School - 3D Scene with Shaders</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #2a1f14; font-family: 'Georgia', serif; }
canvas { display: block; }

#title {
  position: absolute;
  top: 20px;
  left: 30px;
  background: linear-gradient(135deg, #d4b896, #c4a882, #b8976e);
  border: 2px solid #8b6914;
  border-radius: 5px;
  padding: 15px 25px;
  box-shadow: 3px 3px 10px rgba(0,0,0,0.5);
  z-index: 10;
}
#title h1 { color: #3a2a1a; font-size: 22px; text-transform: uppercase; letter-spacing: 2px; }
#title h2 { color: #5a4a3a; font-size: 18px; margin-top: 2px; }

.label {
  position: absolute;
  color: #2a1a0a;
  font-family: 'Georgia', serif;
  font-size: 12px;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 1px;
  pointer-events: none;
  white-space: nowrap;
  background: linear-gradient(135deg, #f0e0c0, #e0d0a8);
  border: 1px solid #a08050;
  padding: 3px 10px;
  border-radius: 3px;
  box-shadow: 1px 1px 4px rgba(0,0,0,0.3);
  transform: translate(-50%, -50%);
  z-index: 10;
}

#info {
  position: absolute;
  bottom: 10px;
  right: 10px;
  color: #a08060;
  font-size: 11px;
  z-index: 10;
}

#controls {
  position: absolute;
  bottom: 10px;
  left: 10px;
  color: #c0a080;
  font-size: 12px;
  z-index: 10;
  background: rgba(30,20,10,0.7);
  padding: 8px 12px;
  border-radius: 5px;
}
</style>
</head>
<body>

<div id="title">
  <h1>Grounds of</h1>
  <h2>Hogwarts School</h2>
</div>

<div id="controls">🖱️ Ліва кнопка - обертання | Колесо - масштабування | Права кнопка - переміщення</div>
<div id="info">Hogwarts 3D Map with Shaders</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x8B7355);

const aspect = window.innerWidth / window.innerHeight;
const frustumSize = 60;
const camera = new THREE.OrthographicCamera(
  frustumSize * aspect / -2, frustumSize * aspect / 2,
  frustumSize / 2, frustumSize / -2, 0.1, 1000
);
camera.position.set(40, 40, 40);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minZoom = 0.5;
controls.maxZoom = 3;

// Lighting
const ambientLight = new THREE.AmbientLight(0xf0e0c0, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xfff0d0, 1.0);
dirLight.position.set(20, 40, 20);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 100;
dirLight.shadow.camera.left = -30;
dirLight.shadow.camera.right = 30;
dirLight.shadow.camera.top = 30;
dirLight.shadow.camera.bottom = -30;
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x8B7355, 0.3);
scene.add(hemiLight);

// ============ SHADERS ============

// 1. PERGAMENT/PARCHMENT SHADER (ground)
const parchmentShader = {
  vertexShader: `
    varying vec2 vUv;
    varying vec3 vNormal;
    varying vec3 vPosition;
    
    void main() {
      vUv = uv;
      vNormal = normalize(normalMatrix * normal);
      vPosition = position;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying vec2 vUv;
    varying vec3 vNormal;
    varying vec3 vPosition;
    
    vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
    vec2 mod289(vec2 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
    vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }
    
    float snoise(vec2 v) {
      const vec4 C = vec4(0.211324865405187, 0.366025403784439,
                         -0.577350269189626, 0.024390243902439);
      vec2 i  = floor(v + dot(v, C.yy));
      vec2 x0 = v - i + dot(i, C.xx);
      vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
      vec4 x12 = x0.xyxy + C.xxzz;
      x12.xy -= i1;
      i = mod289(i);
      vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0))
          + i.x + vec3(0.0, i1.x, 1.0));
      vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy),
          dot(x12.zw,x12.zw)), 0.0);
      m = m*m;
      m = m*m;
      vec3 x = 2.0 * fract(p * C.www) - 1.0;
      vec3 h = abs(x) - 0.5;
      vec3 ox = floor(x + 0.5);
      vec3 a0 = x - ox;
      m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);
      vec3 g;
      g.x  = a0.x  * x0.x  + h.x  * x0.y;
      g.yz = a0.yz * x12.xz + h.yz * x12.yw;
      return 130.0 * dot(m, g);
    }
    
    void main() {
      vec3 baseColor = vec3(0.91, 0.83, 0.69);
      float noise1 = snoise(vUv * 8.0) * 0.5 + 0.5;
      float noise2 = snoise(vUv * 16.0) * 0.5 + 0.5;
      float noise3 = snoise(vUv * 32.0) * 0.5 + 0.5;
      float texture = noise1 * 0.5 + noise2 * 0.3 + noise3 * 0.2;
      float spots = snoise(vUv * 4.0) * 0.5 + 0.5;
      spots = smoothstep(0.4, 0.6, spots);
      float edgeDist = min(min(vUv.x, 1.0-vUv.x), min(vUv.y, 1.0-vUv.y));
      float edgeDark = smoothstep(0.0, 0.1, edgeDist);
      vec3 color = baseColor * (0.85 + texture * 0.3);
      color = mix(color, vec3(0.75, 0.65, 0.50), spots * 0.15);
      color *= edgeDark * 0.8 + 0.2;
      float diffuse = max(dot(vNormal, normalize(vec3(1.0, 2.0, 1.0))), 0.0);
      color *= 0.6 + diffuse * 0.4;
      gl_FragColor = vec4(color, 1.0);
    }
  `
};

// 2. WATER SHADER (lake) - IMPROVED VERSION
const waterShader = {
  vertexShader: `
    varying vec2 vUv;
    varying vec3 vNormal;
    varying vec3 vPosition;
    uniform float uTime;
    
    void main() {
      vUv = uv;
      vNormal = normalize(normalMatrix * normal);
      
      // FIX: Зменшені амплітуди хвиль щоб уникнути оголення суші
      // Максимальне вертикальне зміщення тепер ~0.03 замість ~0.23
      vec3 pos = position;
      float wave1 = sin(pos.x * 2.0 + uTime * 1.5) * 0.02;
      float wave2 = sin(pos.y * 3.0 + uTime * 1.2) * 0.015;
      float wave3 = cos(pos.x * 1.5 + pos.y * 2.0 + uTime) * 0.01;
      pos.z += wave1 + wave2 + wave3;
      
      vPosition = pos;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
    }
  `,
  fragmentShader: `
    varying vec2 vUv;
    varying vec3 vNormal;
    varying vec3 vPosition;
    uniform float uTime;
    
    vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
    vec2 mod289(vec2 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
    vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }
    
    float snoise(vec2 v) {
      const vec4 C = vec4(0.211324865405187, 0.366025403784439,
                         -0.577350269189626, 0.024390243902439);
      vec2 i  = floor(v + dot(v, C.yy));
      vec2 x0 = v - i + dot(i, C.xx);
      vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
      vec4 x12 = x0.xyxy + C.xxzz;
      x12.xy -= i1;
      i = mod289(i);
      vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0))
          + i.x + vec3(0.0, i1.x, 1.0));
      vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy),
          dot(x12.zw,x12.zw)), 0.0);
      m = m*m;
      m = m*m;
      vec3 x = 2.0 * fract(p * C.www) - 1.0;
      vec3 h = abs(x) - 0.5;
      vec3 ox = floor(x + 0.5);
      vec3 a0 = x - ox;
      m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);
      vec3 g;
      g.x  = a0.x  * x0.x  + h.x  * x0.y;
      g.yz = a0.yz * x12.xz + h.yz * x12.yw;
      return 130.0 * dot(m, g);
    }
    
    void main() {
      // FIX: Глибші кольори води для враження глибини
      vec3 deepColor = vec3(0.04, 0.15, 0.25);       // Темніший центр
      vec3 midColor = vec3(0.08, 0.28, 0.42);        // Середня глибина
      vec3 shallowColor = vec3(0.12, 0.42, 0.55);    // Мілководдя
      
      float noise1 = snoise(vUv * 5.0 + vec2(uTime * 0.3, uTime * 0.2));
      float noise2 = snoise(vUv * 10.0 + vec2(uTime * 0.5, -uTime * 0.3));
      
      // FIX: Глибина залежить від відстані від центру (імітація глибшого озера)
      float distFromCenter = length(vUv - vec2(0.5)) * 2.0;
      vec3 depthColor = mix(midColor, deepColor, smoothstep(0.0, 1.0, distFromCenter));
      
      float pattern = noise1 * 0.5 + noise2 * 0.5;
      vec3 color = mix(depthColor, shallowColor, pattern * 0.3 + 0.1);
      
      // Specular highlights
      vec3 lightDir = normalize(vec3(1.0, 2.0, 1.0));
      float specular = pow(max(dot(vNormal, lightDir), 0.0), 32.0);
      color += vec3(1.0, 1.0, 0.9) * specular * 0.4;
      
      // Fresnel effect
      float fresnel = pow(1.0 - abs(dot(vNormal, vec3(0.0, 1.0, 0.0))), 2.0);
      color = mix(color, vec3(0.7, 0.85, 0.95), fresnel * 0.25);
      
      // Caustics
      float caustic = snoise(vUv * 8.0 + vec2(uTime * 0.8, uTime * 0.6));
      caustic = pow(max(caustic, 0.0), 3.0);
      color += vec3(0.2, 0.4, 0.5) * caustic * 0.15;
      
      // FIX: Збільшена непрозорість (0.97 замість 0.85) щоб не було видно дно
      gl_FragColor = vec4(color, 0.97);
    }
  `
};

// 3. STONE SHADER (castle walls)
const stoneShader = {
  vertexShader: `
    varying vec2 vUv;
    varying vec3 vNormal;
    varying vec3 vPosition;
    void main() {
      vUv = uv;
      vNormal = normalize(normalMatrix * normal);
      vPosition = position;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying vec2 vUv;
    varying vec3 vNormal;
    varying vec3 vPosition;
    
    vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
    vec2 mod289(vec2 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
    vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }
    
    float snoise(vec2 v) {
      const vec4 C = vec4(0.211324865405187, 0.366025403784439,
                         -0.577350269189626, 0.024390243902439);
      vec2 i  = floor(v + dot(v, C.yy));
      vec2 x0 = v - i + dot(i, C.xx);
      vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
      vec4 x12 = x0.xyxy + C.xxzz;
      x12.xy -= i1;
      i = mod289(i);
      vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0))
          + i.x + vec3(0.0, i1.x, 1.0));
      vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy),
          dot(x12.zw,x12.zw)), 0.0);
      m = m*m; m = m*m;
      vec3 x = 2.0 * fract(p * C.www) - 1.0;
      vec3 h = abs(x) - 0.5;
      vec3 ox = floor(x + 0.5);
      vec3 a0 = x - ox;
      m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);
      vec3 g;
      g.x  = a0.x  * x0.x  + h.x  * x0.y;
      g.yz = a0.yz * x12.xz + h.yz * x12.yw;
      return 130.0 * dot(m, g);
    }
    
    void main() {
      vec3 stone1 = vec3(0.55, 0.50, 0.45);
      vec3 stone2 = vec3(0.65, 0.58, 0.50);
      vec3 mortar = vec3(0.45, 0.42, 0.38);
      float blockSize = 0.3;
      vec2 blockUV = fract(vUv / blockSize);
      float blockEdge = smoothstep(0.02, 0.05, blockUV.x) * smoothstep(0.02, 0.05, blockUV.y) *
                        smoothstep(0.02, 0.05, 1.0-blockUV.x) * smoothstep(0.02, 0.05, 1.0-blockUV.y);
      float noise1 = snoise(vUv * 10.0) * 0.5 + 0.5;
      float noise2 = snoise(vUv * 20.0) * 0.5 + 0.5;
      float weathering = snoise(vUv * 3.0) * 0.5 + 0.5;
      vec3 color = mix(stone1, stone2, noise1);
      color = mix(color, mortar, 1.0 - blockEdge);
      color *= 0.9 + noise2 * 0.2;
      color *= 0.85 + weathering * 0.15;
      float diffuse = max(dot(vNormal, normalize(vec3(1.0, 2.0, 1.0))), 0.0);
      color *= 0.4 + diffuse * 0.6;
      float specular = pow(max(dot(vNormal, normalize(vec3(1.0, 2.0, 1.0))), 0.0), 16.0);
      color += vec3(0.3) * specular * 0.1;
      gl_FragColor = vec4(color, 1.0);
    }
  `
};

// 4. ROOF/TILE SHADER
const roofShader = {
  vertexShader: `
    varying vec2 vUv;
    varying vec3 vNormal;
    void main() {
      vUv = uv;
      vNormal = normalize(normalMatrix * normal);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying vec2 vUv;
    varying vec3 vNormal;
    void main() {
      vec3 baseColor = vec3(0.29, 0.35, 0.42);
      float tileWidth = 0.1;
      float tileHeight = 0.15;
      float tileX = fract(vUv.x / tileWidth);
      float tileY = fract(vUv.y / tileHeight);
      float edgeX = smoothstep(0.0, 0.05, tileX) * smoothstep(0.0, 0.05, 1.0-tileX);
      float edgeY = smoothstep(0.0, 0.05, tileY) * smoothstep(0.0, 0.05, 1.0-tileY);
      float shadow = smoothstep(0.3, 0.0, tileY);
      vec3 color = baseColor * (0.85 + shadow * 0.15);
      color *= edgeX * edgeY * 0.3 + 0.7;
      color *= 0.95 + sin(vUv.x * 50.0) * 0.02;
      float diffuse = max(dot(vNormal, normalize(vec3(1.0, 2.0, 1.0))), 0.0);
      color *= 0.5 + diffuse * 0.5;
      gl_FragColor = vec4(color, 1.0);
    }
  `
};

// 5. WOOD SHADER
const woodShader = {
  vertexShader: `
    varying vec2 vUv;
    varying vec3 vNormal;
    void main() {
      vUv = uv;
      vNormal = normalize(normalMatrix * normal);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying vec2 vUv;
    varying vec3 vNormal;
    void main() {
      vec3 baseColor = vec3(0.42, 0.29, 0.16);
      vec3 darkColor = vec3(0.28, 0.19, 0.10);
      float grain = sin(vUv.y * 80.0 + sin(vUv.x * 20.0) * 2.0) * 0.5 + 0.5;
      float grain2 = sin(vUv.y * 40.0 + sin(vUv.x * 10.0) * 3.0) * 0.5 + 0.5;
      vec3 color = mix(baseColor, darkColor, grain * 0.5 + grain2 * 0.3);
      float knot = sin(vUv.x * 30.0) * sin(vUv.y * 30.0);
      knot = pow(abs(knot), 8.0);
      color = mix(color, darkColor * 0.7, knot * 0.3);
      float diffuse = max(dot(vNormal, normalize(vec3(1.0, 2.0, 1.0))), 0.0);
      color *= 0.5 + diffuse * 0.5;
      gl_FragColor = vec4(color, 1.0);
    }
  `
};

// 6. TREE/LEAF SHADER
const treeShader = {
  vertexShader: `
    varying vec2 vUv;
    varying vec3 vNormal;
    varying vec3 vPosition;
    void main() {
      vUv = uv;
      vNormal = normalize(normalMatrix * normal);
      vPosition = position;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying vec2 vUv;
    varying vec3 vNormal;
    varying vec3 vPosition;
    
    vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
    vec2 mod289(vec2 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
    vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }
    
    float snoise(vec2 v) {
      const vec4 C = vec4(0.211324865405187, 0.366025403784439,
                         -0.577350269189626, 0.024390243902439);
      vec2 i  = floor(v + dot(v, C.yy));
      vec2 x0 = v - i + dot(i, C.xx);
      vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
      vec4 x12 = x0.xyxy + C.xxzz;
      x12.xy -= i1;
      i = mod289(i);
      vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0))
          + i.x + vec3(0.0, i1.x, 1.0));
      vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy),
          dot(x12.zw,x12.zw)), 0.0);
      m = m*m; m = m*m;
      vec3 x = 2.0 * fract(p * C.www) - 1.0;
      vec3 h = abs(x) - 0.5;
      vec3 ox = floor(x + 0.5);
      vec3 a0 = x - ox;
      m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);
      vec3 g;
      g.x  = a0.x  * x0.x  + h.x  * x0.y;
      g.yz = a0.yz * x12.xz + h.yz * x12.yw;
      return 130.0 * dot(m, g);
    }
    
    void main() {
      vec3 lightGreen = vec3(0.10, 0.30, 0.15);
      vec3 darkGreen = vec3(0.05, 0.20, 0.10);
      vec3 shadow = vec3(0.02, 0.10, 0.05);
      float noise = snoise(vUv * 15.0) * 0.5 + 0.5;
      float noise2 = snoise(vUv * 30.0) * 0.5 + 0.5;
      vec3 color = mix(darkGreen, lightGreen, noise);
      color = mix(color, shadow, noise2 * 0.3);
      float diffuse = max(dot(vNormal, normalize(vec3(1.0, 2.0, 1.0))), 0.0);
      color *= 0.4 + diffuse * 0.6;
      float sss = pow(max(dot(vNormal, normalize(vec3(1.0, 2.0, 1.0))), 0.0), 2.0);
      color += vec3(0.05, 0.15, 0.05) * sss;
      gl_FragColor = vec4(color, 1.0);
    }
  `
};

// 7. SMOKE SHADER
const smokeShader = {
  vertexShader: `
    varying vec2 vUv;
    varying vec3 vNormal;
    uniform float uTime;
    void main() {
      vUv = uv;
      vNormal = normalize(normalMatrix * normal);
      vec3 pos = position;
      pos.y += sin(uTime + position.x * 2.0) * 0.1;
      pos.x += cos(uTime * 0.7 + position.y) * 0.05;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
    }
  `,
  fragmentShader: `
    varying vec2 vUv;
    varying vec3 vNormal;
    uniform float uTime;
    
    vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
    vec2 mod289(vec2 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
    vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }
    
    float snoise(vec2 v) {
      const vec4 C = vec4(0.211324865405187, 0.366025403784439,
                         -0.577350269189626, 0.024390243902439);
      vec2 i  = floor(v + dot(v, C.yy));
      vec2 x0 = v - i + dot(i, C.xx);
      vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
      vec4 x12 = x0.xyxy + C.xxzz;
      x12.xy -= i1;
      i = mod289(i);
      vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0))
          + i.x + vec3(0.0, i1.x, 1.0));
      vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy),
          dot(x12.zw,x12.zw)), 0.0);
      m = m*m; m = m*m;
      vec3 x = 2.0 * fract(p * C.www) - 1.0;
      vec3 h = abs(x) - 0.5;
      vec3 ox = floor(x + 0.5);
      vec3 a0 = x - ox;
      m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);
      vec3 g;
      g.x  = a0.x  * x0.x  + h.x  * x0.y;
      g.yz = a0.yz * x12.xz + h.yz * x12.yw;
      return 130.0 * dot(m, g);
    }
    
    void main() {
      float noise1 = snoise(vUv * 3.0 + vec2(uTime * 0.2, uTime * 0.15));
      float noise2 = snoise(vUv * 6.0 + vec2(uTime * 0.4, -uTime * 0.25));
      vec3 smokeColor = vec3(0.85, 0.85, 0.85);
      float alpha = 0.4 + noise1 * 0.3 + noise2 * 0.2;
      float dist = length(vUv - vec2(0.5));
      alpha *= smoothstep(0.5, 0.3, dist);
      gl_FragColor = vec4(smokeColor, alpha);
    }
  `
};

// 8. METAL SHADER (train)
const metalShader = {
  vertexShader: `
    varying vec2 vUv;
    varying vec3 vNormal;
    varying vec3 vPosition;
    void main() {
      vUv = uv;
      vNormal = normalize(normalMatrix * normal);
      vPosition = position;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying vec2 vUv;
    varying vec3 vNormal;
    varying vec3 vPosition;
    void main() {
      vec3 baseColor = vec3(0.67, 0.13, 0.13);
      vec3 lightDir = normalize(vec3(1.0, 2.0, 1.0));
      vec3 viewDir = normalize(-vPosition);
      vec3 reflectDir = reflect(-lightDir, vNormal);
      float specular = pow(max(dot(viewDir, reflectDir), 0.0), 64.0);
      float fresnel = pow(1.0 - max(dot(vNormal, viewDir), 0.0), 3.0);
      vec3 color = baseColor * 0.6;
      color += vec3(1.0, 1.0, 1.0) * specular * 0.8;
      color += vec3(0.3, 0.3, 0.3) * fresnel * 0.3;
      float diffuse = max(dot(vNormal, lightDir), 0.0);
      color *= 0.4 + diffuse * 0.6;
      float brush = sin(vUv.y * 100.0) * 0.02;
      color += vec3(brush);
      gl_FragColor = vec4(color, 1.0);
    }
  `
};

// 9. PUMPKIN SHADER
const pumpkinShader = {
  vertexShader: `
    varying vec2 vUv;
    varying vec3 vNormal;
    void main() {
      vUv = uv;
      vNormal = normalize(normalMatrix * normal);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying vec2 vUv;
    varying vec3 vNormal;
    void main() {
      vec3 baseColor = vec3(0.80, 0.40, 0.00);
      vec3 darkColor = vec3(0.50, 0.25, 0.00);
      float segment = sin(vUv.x * 3.14159 * 4.0) * 0.5 + 0.5;
      vec3 color = mix(darkColor, baseColor, segment);
      float stem = smoothstep(0.0, 0.2, vUv.y);
      color = mix(vec3(0.30, 0.50, 0.10), color, stem);
      float diffuse = max(dot(vNormal, normalize(vec3(1.0, 2.0, 1.0))), 0.0);
      color *= 0.5 + diffuse * 0.5;
      gl_FragColor = vec4(color, 1.0);
    }
  `
};

// 10. LAKE BED SHADER (дно озера - для візуальної глибини)
const lakeBedShader = {
  vertexShader: `
    varying vec2 vUv;
    varying vec3 vNormal;
    void main() {
      vUv = uv;
      vNormal = normalize(normalMatrix * normal);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying vec2 vUv;
    varying vec3 vNormal;
    
    vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
    vec2 mod289(vec2 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
    vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }
    
    float snoise(vec2 v) {
      const vec4 C = vec4(0.211324865405187, 0.366025403784439,
                         -0.577350269189626, 0.024390243902439);
      vec2 i  = floor(v + dot(v, C.yy));
      vec2 x0 = v - i + dot(i, C.xx);
      vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
      vec4 x12 = x0.xyxy + C.xxzz;
      x12.xy -= i1;
      i = mod289(i);
      vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0))
          + i.x + vec3(0.0, i1.x, 1.0));
      vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy),
          dot(x12.zw,x12.zw)), 0.0);
      m = m*m; m = m*m;
      vec3 x = 2.0 * fract(p * C.www) - 1.0;
      vec3 h = abs(x) - 0.5;
      vec3 ox = floor(x + 0.5);
      vec3 a0 = x - ox;
      m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);
      vec3 g;
      g.x  = a0.x  * x0.x  + h.x  * x0.y;
      g.yz = a0.yz * x12.xz + h.yz * x12.yw;
      return 130.0 * dot(m, g);
    }
    
    void main() {
      // Темне дно озера з мулом
      vec3 deepMud = vec3(0.08, 0.10, 0.12);
      vec3 sand = vec3(0.35, 0.30, 0.25);
      
      float noise = snoise(vUv * 6.0) * 0.5 + 0.5;
      vec3 color = mix(deepMud, sand, noise * 0.3);
      
      float diffuse = max(dot(vNormal, normalize(vec3(1.0, 1.0, 1.0))), 0.0);
      color *= 0.3 + diffuse * 0.3;
      
      gl_FragColor = vec4(color, 1.0);
    }
  `
};

    house.add(win);
  }

  house.position.set(x, 0, z);
  return house;
}

function createPath(points) {
  const pathGroup = new THREE.Group();
  const pathMat2 = new THREE.MeshLambertMaterial({ color: 0xa08060 });
  for (let i = 0; i < points.length - 1; i++) {
    const p1 = points[i];
    const p2 = points[i + 1];
    const dot = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.05, 6), pathMat2);
    dot.rotation.x = -Math.PI / 2;
    dot.position.set(p1[0], 0.08, p1[2]);
    pathGroup.add(dot);
  }
  const lastDot = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.05, 6), pathMat2);
  lastDot.rotation.x = -Math.PI / 2;
  lastDot.position.set(points[points.length-1][0], 0.08, points[points.length-1][2]);
  pathGroup.add(lastDot);
  return pathGroup;
}

// ============ ANIMATION ============
let time = 0;

function animate() {
  requestAnimationFrame(animate);
  time += 0.016;

  controls.update();

  // Update shader uniforms
  waterMat.uniforms.uTime.value = time;
  smokeMat.uniforms.uTime.value = time;

  // Animate squid tentacles
  squidGroup.children.forEach((child, i) => {
    if (i > 0) {
      child.rotation.z = 0.2 + Math.sin(time * 2 + i) * 0.1;
    }
  });

  // Animate smoke
  smokeParticles.forEach((smoke, i) => {
    smoke.position.y = 3.5 + i * 0.8 + Math.sin(time + i * 0.5) * 0.3;
    smoke.position.x = -0.5 - i * 1.2 - time * 0.5 % 2;
    smoke.scale.setScalar(0.8 + Math.sin(time * 2 + i) * 0.2);
  });

  // Animate willow branches
  willowGroup.children.forEach((child, i) => {
    if (i > 1 && i < 13) {
      child.rotation.z = Math.sin(time * 3 + i) * 0.1;
    }
  });

  // Update labels
  labelElements.forEach(({ el, pos }) => {
    const projected = pos.clone().project(camera);
    const x = (projected.x * 0.5 + 0.5) * window.innerWidth;
    const y = (-projected.y * 0.5 + 0.5) * window.innerHeight;
    el.style.left = x + 'px';
    el.style.top = y + 'px';

    if (projected.z > 1) {
      el.style.display = 'none';
    } else {
      el.style.display = 'block';
    }
  });

  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  const aspect = window.innerWidth / window.innerHeight;
  camera.left = frustumSize * aspect / -2;
  camera.right = frustumSize * aspect / 2;
  camera.top = frustumSize / 2;
  camera.bottom = frustumSize / -2;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
